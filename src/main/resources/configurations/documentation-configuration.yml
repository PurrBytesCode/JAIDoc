jdk:
  source:
    download:
      directory: ${JDK_SOURCE_DOWNLOAD_ZIP:./jdk-sources}
  distribution:
    download:
      # Directory where downloaded JDK distributions (for documenting non-running versions) are cached.
      directory: ${JDK_DIST_DOWNLOAD_DIR:./jdk-distributions}

doclet:
  work:
    directory: ${DOCLET_WORK_DIR:./jdk-doc-workspace}
  output:
    directory: ${DOCLET_OUTPUT_DIR:data}
  jar:
    # Directory containing JAIDoc-doclet.jar (passed to javadoc via -docletpath).
    directory: ${DOCLET_JAR_DIR:doclet}
  javadoc:
    # JDK home whose bin/javadoc runs the doclet. Empty = the running JDK (java.home).
    # Must be a JDK >= 17 (the doclet needs Jackson 3).
    home: ${DOCLET_JAVADOC_HOME:}
  # Comma-separated JDK modules to document. Empty = all modules found in the JDK's lib/src.zip.
  modules: ${DOCLET_MODULES:}
